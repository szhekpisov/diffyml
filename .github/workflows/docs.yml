name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'doc/gen-cli-ref/**'
      - 'pkg/diffyml/cli/cli.go'
      - 'pkg/diffyml/cli/flag_metadata.go'
      - '.github/workflows/docs.yml'
      - '.github/workflows/_docs-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_docs-build.yml
