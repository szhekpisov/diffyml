name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/mutation.yml'

  mutation:
    needs: changes
    # On push to main, always run (catches coverage rot in untouched code).
    # On PRs, only run when Go source / module / workflow files changed —
    # the gate emits a visible "skipped" status so branch protection can
    # require this check.
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Bypass proxy.golang.org + sum.golang.org so a force-retagged release
    # is fetched fresh from GitHub. Set at job level so the gomutants action's
    # internal `go install` step inherits it. Go's module proxy treats
    # published versions as immutable; without this, an upstream retag is
    # invisible to consumers.
    env:
      GOPROXY: direct
      GOSUMDB: "off"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # --changed-since needs the merge-base with the PR base ref
          # available locally; the default shallow clone hides it.
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      # PRs: --changed-since limits work to touched lines; gate on
      # "no LIVED mutant in the diff" via threshold-efficacy=100.
      - name: Run mutation testing (PR — diff only)
        if: github.event_name == 'pull_request'
        uses: szhekpisov/gomutants@564651b902e1c9a9bf5da154126532e276e4cee5 # v0.2.3
        with:
          version: v0.2.3
          threshold-efficacy: "100"
          args: >-
            --workers 2
            --coverpkg ./pkg/diffyml/...
            --changed-since origin/${{ github.base_ref }}
            ./pkg/diffyml/

      # Push to main: full-tree run; gate on the absolute test_efficacy
      # floor (catches coverage rot in code no PR happens to touch).
      # Pinned to the local measurement at migration time (gomutants v0.1.0,
      # 2026-04-29): 85.66% efficacy on 2325 mutants (1666 killed, 279 lived,
      # 324 not_viable, 34 not_covered, 22 timed_out). gomutants runs ~16
      # mutators vs gremlins' 11, so the absolute number is lower than the
      # legacy 100% figure. Ratchet up as tests improve.
      - name: Run mutation testing (post-merge — full)
        if: github.event_name == 'push'
        uses: szhekpisov/gomutants@564651b902e1c9a9bf5da154126532e276e4cee5 # v0.2.3
        with:
          version: v0.2.3
          threshold-efficacy: "85.65"
          args: >-
            --workers 2
            --coverpkg ./pkg/diffyml/...
            --stryker-output stryker-report.json
            ./pkg/diffyml/

      # Push the Stryker-format report to the public dashboard so the
      # mutation-score badge in the README reflects the latest main. Only
      # runs on push to main: the dashboard keys reports by branch/SHA,
      # and PR-branch uploads from --changed-since runs are partial.
      # `if: always()` is intentionally NOT used — a failed mutation run
      # should not push a misleading score.
      - name: Upload to Stryker Dashboard
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          STRYKER_DASHBOARD_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
        run: |
          curl -fSs -X PUT \
            -H "X-Api-Key: $STRYKER_DASHBOARD_KEY" \
            -H "Content-Type: application/json" \
            --data @stryker-report.json \
            "https://dashboard.stryker-mutator.io/api/reports/github.com/szhekpisov/diffyml/main"

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30

      - name: Upload Stryker report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-report
          path: stryker-report.json
          retention-days: 30
