name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0

      - name: Run mutation testing
        run: >-
          gremlins unleash
          --workers 2
          --coverpkg="./pkg/diffyml/..."
          --output=mutation-report.json
          ./pkg/diffyml/

      - name: Check efficacy threshold
        id: efficacy
        run: |
          EFFICACY=$(jq '.test_efficacy' mutation-report.json)
          echo "Test efficacy: ${EFFICACY}%"
          echo "value=$EFFICACY" >> "$GITHUB_OUTPUT"
          THRESHOLD=98
          if [ "$(echo "$EFFICACY < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Mutation test efficacy ${EFFICACY}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Update mutation badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.MUTATION_BADGE_GIST_ID }}
          filename: mutation-badge.json
          label: mutation testing
          message: "${{ steps.efficacy.outputs.value }}%"
          valColorRange: ${{ steps.efficacy.outputs.value }}
          minColorRange: 90
          maxColorRange: 100

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30
