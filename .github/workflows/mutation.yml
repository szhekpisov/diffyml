name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0

      - name: Run mutation testing (per internal package)
        run: |
          for pkg in types parse compare format run; do
            echo "=== Mutation testing: $pkg ==="
            gremlins unleash --workers 2 --integration \
              --coverpkg="./pkg/diffyml/internal/$pkg" \
              --output="mutation-report-$pkg.json" ./pkg/diffyml/
          done
          bash scripts/merge-mutation-reports.sh mutation-report-*.json > mutation-report.json
          rm -f mutation-report-{types,parse,compare,format,run}.json

      - name: Check efficacy threshold
        run: |
          EFFICACY=$(jq '.test_efficacy' mutation-report.json)
          echo "Test efficacy: ${EFFICACY}%"
          THRESHOLD=100
          if [ "$(echo "$EFFICACY < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Mutation test efficacy ${EFFICACY}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30
