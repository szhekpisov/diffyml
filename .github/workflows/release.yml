name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${TAG}' does not match strict semver format vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "Tag '${TAG}' is valid semver"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Verify version output
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o diffyml_verify
          OUTPUT=$(./diffyml_verify --version)
          echo "Version output: ${OUTPUT}"
          if [[ "${OUTPUT}" != *"${VERSION}"* ]]; then
            echo "::error::Version output does not contain expected version '${VERSION}'"
            exit 1
          fi
          echo "Version verification passed"
          rm -f diffyml_verify

  release:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@3fc49fb50d59c6ab7917a2e4195dba633e515b29 # v3.2.0
        with:
          dockerfile: Dockerfile.goreleaser
          failure-threshold: warning

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25 # v3.4.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate subject hashes for SLSA provenance
        id: hash
        env:
          ARTIFACTS: "${{ steps.goreleaser.outputs.artifacts }}"
        run: |
          checksum_file=$(echo "$ARTIFACTS" | jq -r '.[] | select (.type=="Checksum") | .path')
          echo "hashes=$(cat "$checksum_file" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Export per-arch images for scanning
        id: images
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p image-tars
          for arch in amd64 arm64; do
            IMG="ghcr.io/szhekpisov/diffyml:${VERSION}-${arch}"
            docker save "$IMG" -o "image-tars/diffyml-${arch}.tar"
          done
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Scan amd64 image with Grype
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        id: grype-amd64
        with:
          image: docker-archive:image-tars/diffyml-amd64.tar
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype amd64 SARIF
        if: always() && steps.grype-amd64.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.grype-amd64.outputs.sarif }}
          category: grype-image-amd64

      - name: Scan arm64 image with Grype
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        id: grype-arm64
        with:
          image: docker-archive:image-tars/diffyml-arm64.tar
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype arm64 SARIF
        if: always() && steps.grype-arm64.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.grype-arm64.outputs.sarif }}
          category: grype-image-arm64

      - name: Push per-arch images to GHCR
        env:
          VERSION: ${{ steps.images.outputs.version }}
        run: |
          for arch in amd64 arm64; do
            docker push "ghcr.io/szhekpisov/diffyml:${VERSION}-${arch}"
          done

      - name: Create multi-arch manifests
        env:
          VERSION: ${{ steps.images.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/szhekpisov/diffyml:${VERSION}" \
            "ghcr.io/szhekpisov/diffyml:${VERSION}-amd64" \
            "ghcr.io/szhekpisov/diffyml:${VERSION}-arm64"
          docker buildx imagetools create \
            -t "ghcr.io/szhekpisov/diffyml:latest" \
            "ghcr.io/szhekpisov/diffyml:${VERSION}-amd64" \
            "ghcr.io/szhekpisov/diffyml:${VERSION}-arm64"

      - name: Resolve manifest digest
        id: manifest
        env:
          VERSION: ${{ steps.images.outputs.version }}
        run: |
          IMAGE="ghcr.io/szhekpisov/diffyml:${VERSION}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" | awk '/^Digest:/ {print $2; exit}')
          if [[ -z "$DIGEST" ]]; then
            echo "::error::Could not resolve manifest digest for $IMAGE"
            exit 1
          fi
          echo "image=ghcr.io/szhekpisov/diffyml" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign manifest with cosign
        env:
          IMAGE: ${{ steps.manifest.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest image build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.manifest.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: false

  publish:
    needs: [release, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: multiple.intoto.jsonl
          path: provenance

      - name: Upload provenance to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" provenance/*.intoto.jsonl --repo "$GITHUB_REPOSITORY"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

  update-changelog:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Commit and push changelog
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update CHANGELOG.md for ${TAG}"
          git push
