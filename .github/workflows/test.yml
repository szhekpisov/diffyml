name: Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Run tests
        run: go test ./...

  fuzz:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Run fuzz tests
        run: |
          for target in FuzzCompare FuzzCompareWithOptions FuzzParseWithOrder FuzzDocumentParser; do
            echo "=== Fuzzing $target for 30s ==="
            go test -fuzz="^${target}$" -fuzztime=30s -run='^$' ./pkg/diffyml/
          done

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Run tests with coverage
        run: go test ./pkg/diffyml/ -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage thresholds
        run: |
          set -euo pipefail

          TOTAL_COV=$(awk -F'[ ]' 'NR > 1 {
            total += $(NF-1)
            if ($NF > 0) covered += $(NF-1)
          } END {
            printf "%.1f", (total > 0 ? covered * 100 / total : 0)
          }' coverage.out)

          echo ""
          echo "=== Coverage Summary ==="
          printf "%-20s %8s %10s %s\n" "File" "Actual" "Required" "Status"
          printf "%-20s %8s %10s %s\n" "----" "------" "--------" "------"

          FAIL=0

          check_threshold() {
            local file="$1" actual="$2" required="$3"
            local status="PASS"
            if [ "$(echo "$actual < $required" | bc -l)" -eq 1 ]; then
              status="FAIL"
              FAIL=1
            fi
            printf "%-20s %7s%% %9s%% %s\n" "$file" "$actual" "$required" "$status"
          }

          check_threshold "TOTAL" "$TOTAL_COV" "98.0"

          echo ""

          if [ "$FAIL" -eq 1 ]; then
            echo "Coverage threshold check FAILED"
            exit 1
          fi

          echo "All coverage thresholds passed"
