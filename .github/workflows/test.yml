name: Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile*'
            packaging:
              - '.goreleaser.yaml'
              - 'Makefile'

  hadolint:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile.goreleaser
          failure-threshold: warning

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Run tests
        run: go test -race ./...

  windows-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Run tests
        run: go test ./... # no -race: requires a C toolchain on Windows; logic-level race coverage runs on the ubuntu test job

      - name: Smoke test binary
        shell: pwsh
        run: |
          go build -o diffyml.exe .
          ./diffyml.exe --version
          "name: test`nvalue: 1" | Set-Content a.yaml
          "name: test`nvalue: 2" | Set-Content b.yaml
          ./diffyml.exe -s a.yaml b.yaml
          if ($LASTEXITCODE -ne 1) { Write-Error "expected exit 1 for differing files, got $LASTEXITCODE"; exit 1 }
          ./diffyml.exe -s a.yaml a.yaml
          if ($LASTEXITCODE -ne 0) { Write-Error "expected exit 0 for identical files, got $LASTEXITCODE"; exit 1 }
          Write-Host "Windows smoke test passed"
          exit 0

  fuzz:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Run fuzz tests
        run: |
          for target in FuzzCompare FuzzCompareWithOptions FuzzParseWithOrder FuzzDocumentParser; do
            echo "=== Fuzzing $target for 30s ==="
            go test -fuzz="^${target}$" -fuzztime=30s -run='^$' ./pkg/diffyml/
          done

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Run tests with coverage
        run: go test ./pkg/diffyml/ -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage thresholds
        run: |
          set -euo pipefail

          TOTAL_COV=$(awk -F'[ ]' 'NR > 1 {
            total += $(NF-1)
            if ($NF > 0) covered += $(NF-1)
          } END {
            printf "%.1f", (total > 0 ? covered * 100 / total : 0)
          }' coverage.out)

          echo ""
          echo "=== Coverage Summary ==="
          printf "%-20s %8s %10s %s\n" "File" "Actual" "Required" "Status"
          printf "%-20s %8s %10s %s\n" "----" "------" "--------" "------"

          FAIL=0

          check_threshold() {
            local file="$1" actual="$2" required="$3"
            local status="PASS"
            if [ "$(echo "$actual < $required" | bc -l)" -eq 1 ]; then
              status="FAIL"
              FAIL=1
            fi
            printf "%-20s %7s%% %9s%% %s\n" "$file" "$actual" "$required" "$status"
          }

          check_threshold "TOTAL" "$TOTAL_COV" "99.0"

          echo ""

          if [ "$FAIL" -eq 1 ]; then
            echo "Coverage threshold check FAILED"
            exit 1
          fi

          echo "All coverage thresholds passed"

  packages:
    needs: changes
    if: needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: false

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          install-only: true

      - name: Build and verify Linux packages
        run: make packages-verify
