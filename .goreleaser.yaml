---
version: 2

project_name: diffyml

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.buildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: sbom

brews:
  - repository:
      owner: szhekpisov
      name: homebrew-diffyml
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    directory: Formula
    homepage: "https://github.com/szhekpisov/diffyml"
    description: "Structural diff tool for YAML files"
    license: "MIT"
    skip_upload: auto
    commit_msg_template: "Update diffyml to {{ .Version }}"
    test: |
      assert_match version.to_s, shell_output("#{bin}/diffyml --version")

      (testpath/"file1.yaml").write <<~YAML
        name: test
        value: 1
      YAML

      (testpath/"file2.yaml").write <<~YAML
        name: test
        value: 2
      YAML

      output = shell_output("#{bin}/diffyml #{testpath}/file1.yaml #{testpath}/file2.yaml")
      assert_match "value", output

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  name_template: "v{{.Version}}"

snapshot:
  version_template: "{{ .Tag }}-next"
