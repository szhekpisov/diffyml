---
version: 2

project_name: diffyml

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.buildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: packages
    package_name: diffyml
    vendor: Sergei Zhekpisov
    homepage: https://github.com/szhekpisov/diffyml
    maintainer: Sergei Zhekpisov <87662520+szhekpisov@users.noreply.github.com>
    description: |-
      Structural diff tool for YAML files.
      Compares YAML files semantically (understanding key ordering, list
      identity, multi-document streams, and Kubernetes resources) with
      multiple output formats for CI integration.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    priority: optional
    mtime: "{{ .CommitDate }}"
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/diffyml/copyright
      - src: ./README.md
        dst: /usr/share/doc/diffyml/README.md

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
  - id: package
    artifacts: package
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: sbom

dockers:
  - image_templates:
      - "ghcr.io/szhekpisov/diffyml:{{ .Version }}-amd64"
    skip_push: true
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Structural diff tool for YAML files"
      - "--label=org.opencontainers.image.source=https://github.com/szhekpisov/diffyml"
      - "--label=org.opencontainers.image.url=https://github.com/szhekpisov/diffyml"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/szhekpisov/diffyml:{{ .Version }}-arm64"
    skip_push: true
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Structural diff tool for YAML files"
      - "--label=org.opencontainers.image.source=https://github.com/szhekpisov/diffyml"
      - "--label=org.opencontainers.image.url=https://github.com/szhekpisov/diffyml"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=MIT"

brews:
  - repository:
      owner: szhekpisov
      name: homebrew-diffyml
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    directory: Formula
    homepage: "https://github.com/szhekpisov/diffyml"
    description: "Structural diff tool for YAML files"
    license: "MIT"
    skip_upload: auto
    commit_msg_template: "Update diffyml to {{ .Version }}"
    test: |
      assert_match version.to_s, shell_output("#{bin}/diffyml --version")

      (testpath/"file1.yaml").write <<~YAML
        name: test
        value: 1
      YAML

      (testpath/"file2.yaml").write <<~YAML
        name: test
        value: 2
      YAML

      output = shell_output("#{bin}/diffyml #{testpath}/file1.yaml #{testpath}/file2.yaml")
      assert_match "value", output

changelog:
  sort: asc
  groups:
    - title: Security
      regexp: '^fix\(security\)'
      order: 0
    - title: Features
      regexp: "^feat"
      order: 1
    - title: Fixes
      regexp: "^(fix|bug)"
      order: 2
    - title: Documentation
      regexp: "^(doc|docs|readme)"
      order: 3
    - title: Other
      order: 99
  filters:
    exclude:
      - "^doc"
      - "^test:"
      - "^chore:"

release:
  draft: true
  name_template: "v{{.Version}}"

snapshot:
  version_template: "{{ .Tag }}-next"
