apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: production
  annotations:
    argocd.argoproj.io/tracking-id: web-api-v2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
      - name: web-api
        image: registry.example.com/web-api:2.0.0
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: debug
        - name: DATABASE_URL
          value: "postgres://db.prod.internal:5433/myapp"
        - name: ENABLE_METRICS
          value: "true"
