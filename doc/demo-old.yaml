apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: production
  annotations:
    argocd.argoproj.io/tracking-id: web-api-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
      - name: web-api
        image: registry.example.com/web-api:1.4.2
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: info
        - name: DATABASE_URL
          value: "postgres://db.prod.internal:5432/myapp"
