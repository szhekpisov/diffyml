{{- $home := .Site.Home -}}
{{- $repo := .Site.Params.BookRepo -}}
<header class="site-header" role="banner">
  <div class="site-header__bar">
    <button type="button" class="site-header__menu-toggle" aria-label="Toggle navigation"
            onclick="document.getElementById('menu-control').click();">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
      </svg>
    </button>
    <a class="site-header__brand" href="{{ $home.RelPermalink }}">
      <span class="site-header__title">{{ .Site.Title }}</span>
      {{- with .Site.Params.SiteTagline }}
      <span class="site-header__tagline">{{ . }}</span>
      {{- end }}
    </a>
    <div class="site-header__spacer"></div>
    <button type="button" class="site-header__theme-toggle" data-theme-toggle
            title="Toggle light / dark theme" aria-label="Toggle light / dark theme">
      <svg class="site-header__theme-icon site-header__theme-icon--sun"
           viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3zm0-12a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V4a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zM4 12a1 1 0 0 1-1 1H1a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1zm19 0a1 1 0 0 1-1 1h-2a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1zM5.64 5.64a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 1 1-1.41 1.41L5.64 7.05a1 1 0 0 1 0-1.41zm11.31 11.31a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.41 1.41l-1.42-1.42a1 1 0 0 1 0-1.41zm0-9.9a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 0 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0zM5.64 18.36a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 1 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0z"/>
      </svg>
      <svg class="site-header__theme-icon site-header__theme-icon--moon"
           viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    {{- with $repo }}
      {{- $path := replaceRE "^https?://[^/]+/" "" . -}}
      {{- $path = strings.TrimSuffix "/" $path -}}
    <a class="site-header__repo" href="{{ . }}" title="Go to repository"
       data-repo="{{ $path }}" target="_blank" rel="noopener">
      <span class="site-header__repo-icon" aria-hidden="true">
        <svg viewBox="0 0 448 512" width="18" height="18">
          <path fill="currentColor" d="M439.6 236.1 244 40.5c-5.4-5.5-12.8-8.5-20.4-8.5s-15 3-20.4 8.4L162.5 81l51.5 51.5c27.1-9.1 52.7 16.8 43.4 43.7l49.7 49.7c34.2-11.8 61.2 31 35.5 56.7-26.5 26.5-70.2-2.9-56-37.3L240.3 199v121.9c25.3 12.5 22.3 41.8 9.1 55-6.4 6.4-15.2 10.1-24.3 10.1s-17.8-3.6-24.3-10.1c-17.6-17.6-11.1-46.9 11.2-56v-123c-20.8-8.5-24.6-30.7-18.6-45L142.6 101 8.5 235.1C3 240.6 0 247.9 0 255.5s3 15 8.5 20.4l195.6 195.7c5.4 5.4 12.7 8.4 20.4 8.4s15-3 20.4-8.4l194.7-194.7c5.4-5.4 8.4-12.8 8.4-20.4s-3-15-8.4-20.4"/>
        </svg>
      </span>
      <span class="site-header__repo-info">
        <span class="site-header__repo-path">{{ $path }}</span>
        <ul class="site-header__facts" data-md-component="source-facts">
          <li class="site-header__fact site-header__fact--version" hidden>
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path fill="currentColor" d="M5.5 7A1.5 1.5 0 0 1 4 5.5 1.5 1.5 0 0 1 5.5 4 1.5 1.5 0 0 1 7 5.5 1.5 1.5 0 0 1 5.5 7m15.91 4.58-9-9C12.05 2.22 11.55 2 11 2H4c-1.11 0-2 .89-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.56-.23-1.06-.59-1.42z"/>
            </svg>
            <span class="site-header__fact-value"></span>
          </li>
          <li class="site-header__fact site-header__fact--stars" hidden>
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path fill="currentColor" d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
            <span class="site-header__fact-value"></span>
          </li>
          <li class="site-header__fact site-header__fact--forks" hidden>
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path fill="currentColor" d="M6 2a3 3 0 0 0-1 5.83v8.34A3 3 0 1 0 7 16.17V11h4a4 4 0 0 0 4-4v-.17A3 3 0 0 0 14 1a3 3 0 0 0-1 5.83V7a2 2 0 0 1-2 2H7v-.17A3 3 0 0 0 6 2zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm8 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zM6 18a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </svg>
            <span class="site-header__fact-value"></span>
          </li>
        </ul>
      </span>
    </a>
    {{- end }}
  </div>
</header>
