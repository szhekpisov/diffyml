apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: web
          image: nginx:1.26
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/nginx
            - name: tls
              mountPath: /etc/tls
          env:
            - name: ENV
              value: staging
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: log-level
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
      volumes:
        - name: config
          configMap:
            name: nginx-config
        - name: tls
          secret:
            secretName: tls-cert
